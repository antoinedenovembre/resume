name: Compile resume

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [with_image_en, with_image_fr, no_image_en, no_image_fr]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate LaTeX content from YAML
        run: |
          pip install pyyaml
          python scripts/generate_tex.py data/resume.yml src/content/personal.tex personal
          python scripts/generate_tex.py data/resume.yml src/content/resume_content_en.tex en
          python scripts/generate_tex.py data/resume.yml src/content/resume_content_fr.tex fr

      - name: Compile resume (${{ matrix.variant }})
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume_${{ matrix.variant }}.tex
          working_directory: build
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-${{ matrix.variant }}
          path: build/resume_${{ matrix.variant }}.pdf
          retention-days: 30

  release:
    needs: compile
    runs-on: ubuntu-latest
    if: >-
      (github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')) ||
      (startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/tags/latest')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all PDF artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pdf-*
          merge-multiple: true
          path: build

      - name: Prepare release files
        run: |
          cp build/resume_with_image_en.pdf resume-with-image-en.pdf
          cp build/resume_no_image_en.pdf resume-no-image-en.pdf
          cp build/resume_with_image_fr.pdf resume-with-image-fr.pdf
          cp build/resume_no_image_fr.pdf resume-no-image-fr.pdf
          cp build/resume_with_image_en.pdf resume_en.pdf
          cp build/resume_with_image_fr.pdf resume_fr.pdf

      - name: Delete existing latest release
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest resume"
          body: |
            Latest compiled resume PDFs from commit ${{ github.sha }}

            **Files included:**
            - `resume-with-image-en.pdf` - Resume with headshot (English)
            - `resume-no-image-en.pdf` - Resume without headshot (English)
            - `resume-with-image-fr.pdf` - Resume with headshot (French)
            - `resume-no-image-fr.pdf` - Resume without headshot (French)
            - `resume_en.pdf` - Default English resume (with photo)
            - `resume_fr.pdf` - Default French resume (with photo)

            **Build date:** ${{ github.event.head_commit.timestamp }}
          files: resume-with-image-en.pdf,resume-no-image-en.pdf,resume-with-image-fr.pdf,resume-no-image-fr.pdf,resume_en.pdf,resume_fr.pdf
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: resume-with-image-en.pdf,resume-no-image-en.pdf,resume-with-image-fr.pdf,resume-no-image-fr.pdf,resume_en.pdf,resume_fr.pdf
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}
